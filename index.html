<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StemFlow — Multitrack Player</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#060810;--bg1:#0B0E18;--bg2:#111521;--bg3:#181D2C;--bg4:#1F2538;--bg5:#252D42;
  --border:#252D42;--border2:#2D374F;
  --txt1:#DCE4F5;--txt2:#8B96AF;--txt3:#5A6278;
  --accent:#4F8BFF;
  --r:8px;--rlg:12px;
}
body{background:var(--bg0);color:var(--txt1);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;user-select:none}
.mono{font-family:'JetBrains Mono',monospace}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:17px 28px 15px;border-bottom:1px solid var(--border);background:var(--bg1)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-.02em}
.logo-sub{font-size:10px;color:var(--txt3);letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
.header-meta{display:flex;align-items:center;gap:14px}
.chip{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 12px;display:flex;align-items:center;gap:7px}
.chip label{font-size:10px;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase}
.chip span{font-size:13px;font-weight:500;font-family:'JetBrains Mono',monospace}
.chip input[type=number]{background:none;border:none;outline:none;color:var(--txt1);font-family:'JetBrains Mono',monospace;font-size:13px;width:36px;text-align:center}
.chip input[type=number]::-webkit-inner-spin-button{display:none}

/* TRANSPORT */
.transport{display:flex;align-items:center;gap:6px;padding:11px 28px;border-bottom:1px solid var(--border);background:var(--bg1);flex-wrap:wrap}
.tgrp{display:flex;align-items:center;gap:4px}
.sep{width:1px;height:24px;background:var(--border2);margin:0 5px}
.btn{width:34px;height:34px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--txt2)}
.btn:hover{background:var(--bg4);color:var(--txt1)}
.btn:active{transform:scale(.93)}
.btn.active{background:rgba(79,139,255,.15);border-color:rgba(79,139,255,.45);color:var(--accent)}
.btn-play{width:42px;height:42px;border-radius:50%;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.btn-play:hover{background:#3d7af0}
.btn-play:active{transform:scale(.91)}
.btn-play.playing{background:#FF3D5A}
.time-disp{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:0 12px;height:34px;display:flex;align-items:center;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--txt1);min-width:86px;justify-content:center;letter-spacing:.04em}
.mvol{display:flex;align-items:center;gap:7px;margin-left:auto}
.mvol label{font-size:10px;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase}
.mvol input[type=range]{width:80px}
.ftr-btn{height:32px;padding:0 10px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-size:11px;color:var(--txt2);font-family:'Syne',sans-serif;font-weight:500;display:flex;align-items:center;gap:5px;transition:all .12s}
.ftr-btn:hover{background:var(--bg4);color:var(--txt1)}

/* TIMELINE */
.tl-wrap{position:relative;background:var(--bg1);border-bottom:1px solid var(--border);height:44px;cursor:pointer;overflow:hidden}
.tl-bar{position:absolute;top:0;left:0;height:100%;background:rgba(79,139,255,.1)}
.tl-ticks{position:absolute;inset:0;pointer-events:none}
.playhead{position:absolute;top:0;width:2px;height:100%;background:var(--accent);pointer-events:none}
.playhead::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:var(--accent)}

/* TRACK BLOCKS */
.tracks-wrap{background:var(--bg0)}
.track-block{border-bottom:1px solid var(--border)}
.track-row{display:grid;grid-template-columns:4px 176px 86px 1fr;align-items:stretch;height:68px;transition:background .12s}
.track-row:hover{background:rgba(255,255,255,.01)}
.track-stripe{width:4px}
.track-info{display:flex;align-items:center;gap:10px;padding:0 14px;border-right:1px solid var(--border)}
.track-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.track-nm{font-size:13px;font-weight:600;letter-spacing:-.01em}
.track-tp{font-size:10px;color:var(--txt3);letter-spacing:.07em;text-transform:uppercase;margin-top:2px}
.track-quick{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:0 8px;border-right:1px solid var(--border)}
.qrow{display:flex;gap:4px}
.tbtn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--txt3);transition:all .12s;font-family:'Syne',sans-serif}
.tbtn:hover{background:var(--bg4);color:var(--txt1)}
.tbtn.muted{background:rgba(255,61,90,.12);border-color:rgba(255,61,90,.4);color:#FF3D5A}
.tbtn.soloed{background:rgba(255,208,32,.12);border-color:rgba(255,208,32,.4);color:#FFD020}
.tbtn.cfg-open{background:rgba(79,139,255,.15);border-color:rgba(79,139,255,.4);color:var(--accent)}
.cfg-wide{width:58px;font-size:9px;letter-spacing:.04em;gap:4px}
.track-main{display:flex;align-items:center;gap:10px;padding:0 14px}
.vol-grp{display:flex;align-items:center;gap:6px;min-width:126px}
.vol-grp input{flex:1}
.volval{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt3);width:24px;text-align:right}
.meters{display:flex;gap:2px;align-items:center}
.mbar{width:3px;height:36px;background:var(--bg4);border-radius:2px;overflow:hidden;position:relative}
.mfill{position:absolute;bottom:0;left:0;width:100%;border-radius:2px;transition:height .04s}
.wv-canvas{flex:1;display:block;min-width:60px}

/* SETTINGS PANEL */
.settings-panel{background:var(--bg2);border-top:1px solid var(--border);overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.settings-panel.open{max-height:280px}
.sp-inner{padding:14px 18px 16px;display:grid;grid-template-columns:200px 220px 1fr;gap:18px}

.sp-sec{display:flex;flex-direction:column;gap:7px}
.sp-title{font-size:9px;color:var(--txt3);letter-spacing:.14em;text-transform:uppercase;font-weight:700;padding-bottom:5px;border-bottom:1px solid var(--border);margin-bottom:2px}

/* STEREO */
.stv{position:relative;height:32px;background:var(--bg3);border-radius:6px;border:1px solid var(--border);overflow:hidden;margin-bottom:2px}
.stv-center{position:absolute;top:0;left:50%;width:1px;height:100%;background:var(--border2)}
.stv-bar{position:absolute;top:50%;transform:translateY(-50%);height:4px;border-radius:2px;transition:left .12s,width .12s}
.stv-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--txt3);letter-spacing:.05em}
.pan-row{display:flex;align-items:center;gap:7px;margin-top:4px}
.pan-lbl{font-size:9px;width:28px;text-align:right;letter-spacing:.08em;text-transform:uppercase}
.pan-row input{flex:1}
.pv{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt2);width:32px;text-align:right}
.tog-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.tog-sw{width:28px;height:15px;border-radius:8px;background:var(--bg4);border:1px solid var(--border2);cursor:pointer;position:relative;transition:background .15s;flex-shrink:0}
.tog-sw.on{background:rgba(79,139,255,.35);border-color:rgba(79,139,255,.5)}
.tog-sw::after{content:'';position:absolute;top:2px;left:2px;width:9px;height:9px;border-radius:50%;background:var(--txt3);transition:all .15s}
.tog-sw.on::after{left:15px;background:var(--accent)}
.tog-lbl{font-size:10px;color:var(--txt3)}

/* EQ BANDS */
.eq-bands{display:flex;flex-direction:column;gap:5px}
.eq-row{display:flex;align-items:center;gap:7px}
.eq-lbl{font-size:9px;width:28px;text-align:right;letter-spacing:.06em;font-weight:600}
.eq-row input{flex:1}
.eq-val{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt2);width:44px;text-align:right}

/* EQ CANVAS */
.eq-cv-wrap{border-radius:6px;overflow:hidden;border:1px solid var(--border);background:var(--bg3)}

/* SENDS */
.send-rows{display:flex;flex-direction:column;gap:5px;margin-top:6px}
.send-row{display:flex;align-items:center;gap:7px}
.send-lbl{font-size:9px;width:42px;letter-spacing:.06em;text-transform:uppercase}
.send-row input{flex:1}
.sv{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt2);width:22px;text-align:right}

/* GLOBAL SLIDERS */
input[type=range]{-webkit-appearance:none;height:3px;border-radius:2px;background:var(--bg4);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;border:2px solid var(--accent);background:var(--bg2);cursor:pointer;transition:transform .1s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.25)}

/* FOOTER */
footer{display:flex;align-items:center;justify-content:space-between;padding:10px 28px;border-top:1px solid var(--border);background:var(--bg1)}
.foot-st{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt3)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--txt3)}
.foot-acts{display:flex;gap:6px}

/* DROP ZONE */
.drop-zone{position:fixed;inset:0;background:rgba(6,8,16,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:100;border:2px dashed rgba(79,139,255,.3)}
.drop-zone.active{opacity:1;pointer-events:all}
.drop-zone p{font-size:18px;font-weight:600}
.drop-zone small{color:var(--txt2);font-size:13px}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
</style>
</head>
<body>

<div class="drop-zone" id="dropZone">
  <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
  <p>Solte os arquivos de áudio aqui</p>
  <small>WAV · MP3 · FLAC · AIFF</small>
</div>

<header>
  <div class="logo">
    <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M2 12h2M6 8v8M10 5v14M14 9v6M18 6v12M22 10v4"/></svg></div>
    <div><div class="logo-text">StemFlow</div><div class="logo-sub">Multitrack Studio</div></div>
  </div>
  <div class="header-meta">
    <div class="chip"><label>BPM</label><input type="number" id="bpmInput" value="120" min="40" max="300"></div>
    <div class="chip"><label>Key</label><span>A min</span></div>
    <div class="chip"><label>Bars</label><span>16</span></div>
    <div class="chip"><label>SR</label><span>44.1k</span></div>
  </div>
</header>

<div class="transport">
  <div class="tgrp">
    <button class="btn" id="btnRew">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 20L9 12l10-8v16zM5 4h2v16H5z"/></svg>
    </button>
    <button class="btn-play" id="btnPlay">
      <svg id="playIcon" width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
    </button>
    <button class="btn" id="btnStop">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    </button>
  </div>
  <div class="sep"></div>
  <div class="tgrp">
    <button class="btn" id="btnLoop">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
    </button>
    <button class="btn" id="btnMetro">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 2 21 22 21"/><line x1="12" y1="9" x2="15" y2="18"/></svg>
    </button>
  </div>
  <div class="sep"></div>
  <div class="time-disp" id="timeDisp">00:00.00</div>
  <div class="sep"></div>
  <div class="mvol">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--txt3)" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/></svg>
    <label>Master</label>
    <input type="range" id="masterVol" min="0" max="100" value="80">
    <span class="mono" id="masterVolVal" style="font-size:10px;color:var(--txt3);width:22px">80</span>
  </div>
  <div class="sep"></div>
  <button class="ftr-btn" id="btnImport">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
    Importar
  </button>
</div>

<div class="tl-wrap" id="timeline">
  <div class="tl-bar" id="tlBar"></div>
  <canvas class="tl-ticks" id="tlTicks"></canvas>
  <div class="playhead" id="playhead"></div>
</div>

<div class="tracks-wrap" id="trackList"></div>

<footer>
  <div class="foot-st"><div class="sdot" id="sdot"></div><span id="statusTxt">Pronto — 6 stems carregados</span></div>
  <div class="foot-acts">
    <button class="ftr-btn" id="btnMuteAll">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
      Silenciar Todos
    </button>
    <button class="ftr-btn" id="btnUnmuteAll">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
      Ativar Todos
    </button>
    <button class="ftr-btn" id="btnExport">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Exportar Mix
    </button>
  </div>
</footer>

<script>
const TRACKS=[
  {id:'kick',  name:'Kick',   type:'Percussão', hex:'#FF3D5A', osc:'square',   freq:60,  baseGain:.65},
  {id:'bass',  name:'Bass',   type:'Baixo',     hex:'#FF7A2E', osc:'sawtooth', freq:55,  baseGain:.50},
  {id:'keys',  name:'Keys',   type:'Teclado',   hex:'#FFD020', osc:'sine',     freq:440, baseGain:.40},
  {id:'guitar',name:'Guitar', type:'Harmônico', hex:'#20E87A', osc:'sawtooth', freq:220, baseGain:.40},
  {id:'vocals',name:'Vocals', type:'Principal', hex:'#20C8FF', osc:'sine',     freq:330, baseGain:.50},
  {id:'pads',  name:'Pads',   type:'Ambiente',  hex:'#9B5EFF', osc:'triangle', freq:110, baseGain:.30},
];

const DURATION=120;
const state={};
TRACKS.forEach(t=>{
  state[t.id]={
    muted:false,soloed:false,vol:80,pan:0,phase:false,settingsOpen:false,
    eq:{low:{gain:0,freq:80},mid:{gain:0,freq:1000,q:1.0},high:{gain:0,freq:8000}},
    sends:{reverb:0,delay:0}
  };
});

let audioCtx=null,masterGain=null,trackNodes={};
let isPlaying=false,startTime=0,pauseOffset=0,loopEnabled=false,animId=null;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=document.getElementById('masterVol').value/100;
  masterGain.connect(audioCtx.destination);
}

// Signal chain: vol gain → lowshelf → peaking → highshelf → panner → analyser → master
function buildChain(track){
  const s=state[track.id];
  const gn=audioCtx.createGain();
  const lf=audioCtx.createBiquadFilter();
  const mf=audioCtx.createBiquadFilter();
  const hf=audioCtx.createBiquadFilter();
  const pn=audioCtx.createStereoPanner();
  const an=audioCtx.createAnalyser(); an.fftSize=512;
  lf.type='lowshelf';  lf.frequency.value=s.eq.low.freq;  lf.gain.value=s.eq.low.gain;
  mf.type='peaking';   mf.frequency.value=s.eq.mid.freq;  mf.gain.value=s.eq.mid.gain; mf.Q.value=s.eq.mid.q;
  hf.type='highshelf'; hf.frequency.value=s.eq.high.freq; hf.gain.value=s.eq.high.gain;
  pn.pan.value=s.pan/100;
  gn.connect(lf); lf.connect(mf); mf.connect(hf); hf.connect(pn); pn.connect(an); an.connect(masterGain);
  const active=!s.muted&&(!TRACKS.some(t=>state[t.id].soloed)||s.soloed);
  gn.gain.value=active?(s.vol/100)*track.baseGain:0;
  return{gn,lf,mf,hf,pn,an,osc:null,lfo:null};
}

function startOsc(track,node){
  try{node.osc&&node.osc.stop();node.lfo&&node.lfo.stop()}catch(e){}
  const osc=audioCtx.createOscillator(); osc.type=track.osc; osc.frequency.value=track.freq;
  const lfo=audioCtx.createOscillator();
  const lg=audioCtx.createGain(); lg.gain.value=0.35;
  lfo.frequency.value=(parseInt(document.getElementById('bpmInput').value)||120)/60*2;
  lfo.connect(lg); lg.connect(node.gn.gain);
  osc.connect(node.gn); osc.start(); lfo.start();
  node.osc=osc; node.lfo=lfo;
}

function play(){
  initAudio();
  if(audioCtx.state==='suspended')audioCtx.resume();
  TRACKS.forEach(t=>{
    if(!trackNodes[t.id])trackNodes[t.id]=buildChain(t);
    startOsc(t,trackNodes[t.id]);
  });
  isPlaying=true; startTime=audioCtx.currentTime-pauseOffset;
  document.getElementById('btnPlay').classList.add('playing');
  document.getElementById('playIcon').innerHTML='<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
  setSt('Reproduzindo','var(--accent)');
  anim();
}

function pause(){
  if(!audioCtx)return;
  pauseOffset=audioCtx.currentTime-startTime;
  TRACKS.forEach(t=>{const n=trackNodes[t.id];if(n){try{n.osc&&n.osc.stop();n.lfo&&n.lfo.stop()}catch(e){}}});
  isPlaying=false; cancelAnimationFrame(animId);
  document.getElementById('btnPlay').classList.remove('playing');
  document.getElementById('playIcon').innerHTML='<path d="M5 3l14 9-14 9V3z"/>';
  setSt('Pausado','#FFD020');
}

function stop(){pause();pauseOffset=0;moveTL(0);updT(0);setSt('Parado — pronto','var(--txt3)');}
function setSt(t,c){document.getElementById('statusTxt').textContent=t;document.getElementById('sdot').style.background=c;}

function anim(){
  if(!isPlaying)return;
  const e=audioCtx.currentTime-startTime;
  let pos=e;
  if(pos>=DURATION){if(loopEnabled){startTime=audioCtx.currentTime;pos=0;}else{stop();return;}}
  moveTL(pos/DURATION); updT(pos); drawWaves(); drawMeters();
  animId=requestAnimationFrame(anim);
}

function moveTL(r){
  document.getElementById('tlBar').style.width=(r*100)+'%';
  document.getElementById('playhead').style.left=(r*document.getElementById('timeline').offsetWidth)+'px';
}
function updT(s){
  const m=Math.floor(s/60),sc=Math.floor(s%60),cs=Math.floor((s%1)*100);
  document.getElementById('timeDisp').textContent=p2(m)+':'+p2(sc)+'.'+p2(cs);
}
function p2(n){return String(n).padStart(2,'0')}

function drawWaves(){
  TRACKS.forEach(t=>{
    const cv=document.getElementById('wave-'+t.id); if(!cv)return;
    const cx=cv.getContext('2d'); cx.clearRect(0,0,cv.width,cv.height);
    const n=trackNodes[t.id];
    if(n&&n.an&&!state[t.id].muted){
      const b=new Uint8Array(n.an.frequencyBinCount); n.an.getByteTimeDomainData(b);
      drawWv(cx,b,cv.width,cv.height,t.hex);
    }else{drawFlat(cx,cv.width,cv.height,t.hex);}
  });
}

function drawWv(cx,data,W,H,col){
  cx.beginPath(); cx.strokeStyle=col; cx.lineWidth=1.5;
  const step=W/data.length;
  for(let i=0;i<data.length;i++){const y=((data[i]/128)-1)*(H/2-3)+H/2;i===0?cx.moveTo(0,y):cx.lineTo(i*step,y);}
  cx.stroke();
  cx.lineTo(W,H/2); cx.lineTo(0,H/2); cx.closePath(); cx.fillStyle=col+'12'; cx.fill();
}
function drawFlat(cx,W,H,col){
  cx.beginPath(); cx.strokeStyle=col+'32'; cx.lineWidth=1; cx.setLineDash([4,8]);
  cx.moveTo(0,H/2); cx.lineTo(W,H/2); cx.stroke(); cx.setLineDash([]);
}

function drawMeters(){
  TRACKS.forEach(t=>{
    const n=trackNodes[t.id]; let lv=0;
    if(n&&n.an&&!state[t.id].muted){
      const b=new Uint8Array(n.an.frequencyBinCount); n.an.getByteFrequencyData(b);
      lv=Math.min(1,(b.reduce((a,x)=>a+x,0)/b.length/255)*3+Math.random()*.12);
    }
    document.querySelectorAll('.mfill-'+t.id).forEach((bar,i)=>{
      const ch=lv*(1-i*.1)*(Math.random()*.22+.85);
      bar.style.height=(ch*100)+'%';
      bar.style.background=ch>.82?'#FF3D5A':ch>.62?'#FFD020':t.hex;
    });
  });
}

// EQ curve visualization
function drawEQ(id){
  const cv=document.getElementById('eqcv-'+id); if(!cv)return;
  const W=cv.width,H=cv.height;
  const cx=cv.getContext('2d'); cx.clearRect(0,0,W,H);
  const s=state[id], track=TRACKS.find(t=>t.id===id);
  // Grid
  for(let db=-12;db<=12;db+=6){
    const y=H/2-(db/12)*(H/2-5);
    cx.beginPath(); cx.strokeStyle=db===0?'rgba(255,255,255,.1)':'rgba(255,255,255,.04)';
    cx.lineWidth=db===0?1:.5; cx.moveTo(0,y); cx.lineTo(W,y); cx.stroke();
  }
  // Freq grid
  [100,1000,10000].forEach(f=>{
    const x=Math.log(f/20)/Math.log(1000)*W;
    cx.beginPath(); cx.strokeStyle='rgba(255,255,255,.04)'; cx.lineWidth=.5;
    cx.moveTo(x,0); cx.lineTo(x,H); cx.stroke();
  });
  // Curve
  cx.beginPath(); cx.strokeStyle=track.hex; cx.lineWidth=2;
  for(let i=0;i<W;i++){
    const freq=20*Math.pow(1000,i/W);
    const rl=s.eq.low.freq, lg=s.eq.low.gain;
    const ldb=lg/(1+Math.pow(freq/rl,3));
    const rm=s.eq.mid.freq, mg=s.eq.mid.gain, mq=s.eq.mid.q;
    const w=freq/rm; const mdb=mg/(1+mq*mq*(w-1/w)*(w-1/w));
    const rh=s.eq.high.freq, hg=s.eq.high.gain;
    const hdb=hg/(1+Math.pow(rh/freq,3));
    const total=ldb+mdb+hdb;
    const y=H/2-(total/14)*(H/2-4);
    i===0?cx.moveTo(0,y):cx.lineTo(i,y);
  }
  cx.stroke();
  cx.lineTo(W,H/2); cx.lineTo(0,H/2); cx.closePath(); cx.fillStyle=track.hex+'14'; cx.fill();
  // Freq labels
  cx.fillStyle='rgba(90,98,120,.75)'; cx.font='8px JetBrains Mono,monospace';
  [['80Hz',80],['1kHz',1000],['8kHz',8000]].forEach(([lbl,f])=>{
    const x=Math.log(f/20)/Math.log(1000)*W;
    cx.fillText(lbl,Math.max(1,x-10),H-2);
  });
}

// Slider fill helper
function fillSlider(el,col,centered=false){
  if(!el)return;
  const pct=(el.value-el.min)/(el.max-el.min)*100;
  if(centered){
    const d=pct-50;
    if(d>=0) el.style.background=`linear-gradient(to right,var(--bg4) 50%,${col} 50%,${col} ${pct}%,var(--bg4) ${pct}%)`;
    else el.style.background=`linear-gradient(to right,var(--bg4) ${pct}%,${col} ${pct}%,${col} 50%,var(--bg4) 50%)`;
  }else{
    el.style.background=`linear-gradient(to right,${col} ${pct}%,var(--bg4) ${pct}%)`;
  }
}

function updateGain(id){
  const node=trackNodes[id]; if(!node)return;
  const track=TRACKS.find(t=>t.id===id), s=state[id];
  const anySolo=TRACKS.some(t=>state[t.id].soloed);
  const active=!s.muted&&(!anySolo||s.soloed);
  node.gn.gain.setTargetAtTime(active?(s.vol/100)*track.baseGain:0,audioCtx.currentTime,.015);
}

function toggleMute(id){
  state[id].muted=!state[id].muted;
  document.getElementById('mute-'+id).classList.toggle('muted',state[id].muted);
  if(audioCtx)updateGain(id);
}

function toggleSolo(id){
  state[id].soloed=!state[id].soloed;
  document.getElementById('solo-'+id).classList.toggle('soloed',state[id].soloed);
  if(audioCtx)TRACKS.forEach(t=>updateGain(t.id));
}

function toggleSettings(id){
  state[id].settingsOpen=!state[id].settingsOpen;
  const panel=document.getElementById('sp-'+id);
  const btn=document.getElementById('cfg-'+id);
  panel.classList.toggle('open',state[id].settingsOpen);
  btn.classList.toggle('cfg-open',state[id].settingsOpen);
  if(state[id].settingsOpen){
    setTimeout(()=>{
      const cv=document.getElementById('eqcv-'+id);
      if(cv){cv.width=cv.offsetWidth||220; drawEQ(id);}
    },40);
  }
}

function setVol(id,val){
  state[id].vol=parseInt(val);
  document.getElementById('volval-'+id).textContent=val;
  fillSlider(document.getElementById('vol-'+id),TRACKS.find(t=>t.id===id).hex);
  if(audioCtx)updateGain(id);
}

function setPan(id,val){
  const v=parseInt(val); state[id].pan=v;
  document.getElementById('panval-'+id).textContent=v===0?'C':v>0?'R'+v:'L'+Math.abs(v);
  fillSlider(document.getElementById('pan-'+id),'var(--accent)',true);
  // Update stereo visualizer
  const bar=document.getElementById('stb-'+id);
  if(bar){bar.style.left=(50+v*0.28-14)+'%'; bar.style.width='28%';}
  const node=trackNodes[id];
  if(node&&node.pn)node.pn.pan.setTargetAtTime(v/100,audioCtx.currentTime,.01);
}

function setEQ(id,band,param,val){
  const v=parseFloat(val); state[id].eq[band][param]=v;
  const key=`eq${band}${param==='q'?'q':''}-${id}`;
  const dispEl=document.getElementById(key+'v');
  if(dispEl)dispEl.textContent=param==='q'?`Q${v.toFixed(1)}`:`${v>0?'+':''}${parseFloat(v).toFixed(1)}dB`;
  const colMap={low:'#4FC3FF',mid:TRACKS.find(t=>t.id===id).hex,high:'#FF8C42'};
  fillSlider(document.getElementById(key),param==='q'?'var(--txt2)':colMap[band],param!=='q');
  const node=trackNodes[id];
  if(node){
    const f={low:node.lf,mid:node.mf,high:node.hf}[band];
    if(f){
      if(param==='gain')f.gain.setTargetAtTime(v,audioCtx.currentTime,.01);
      else if(param==='q')f.Q.setTargetAtTime(v,audioCtx.currentTime,.01);
      else if(param==='freq')f.frequency.setTargetAtTime(v,audioCtx.currentTime,.01);
    }
  }
  drawEQ(id);
}

function setSend(id,send,val){
  state[id].sends[send]=parseInt(val);
  const key=(send==='reverb'?'rev':'del');
  document.getElementById(key+'v-'+id).textContent=val;
  fillSlider(document.getElementById(key+'-'+id),send==='reverb'?'#9B5EFF':'#20C8FF');
}

function togglePhase(id){
  state[id].phase=!state[id].phase;
  document.getElementById('ph-'+id).classList.toggle('on',state[id].phase);
}

function drawTicks(){
  const cv=document.getElementById('tlTicks');
  const W=cv.offsetWidth||window.innerWidth, H=cv.offsetHeight||44;
  cv.width=W; cv.height=H;
  const cx=cv.getContext('2d');
  const bpm=parseInt(document.getElementById('bpmInput').value)||120;
  const beats=bpm*(DURATION/60);
  cx.font='9px JetBrains Mono,monospace';
  for(let b=0;b<=beats;b++){
    const x=(b/beats)*W, isBar=b%4===0;
    cx.strokeStyle=isBar?'rgba(90,98,120,.5)':'rgba(90,98,120,.15)';
    cx.lineWidth=isBar?1:.5;
    cx.beginPath(); cx.moveTo(x,isBar?0:H*.55); cx.lineTo(x,H); cx.stroke();
    if(isBar&&b>0){cx.fillStyle='rgba(90,98,120,.6)';cx.fillText(b/4+1,x+2,10);}
  }
}

    </div>
    <canvas id="wave-${track.id}" class="wv-canvas" height="42" style="flex:1;min-width:60px"></canvas>
  </div>
</div>

<div class="settings-panel ${s.settingsOpen?'open':''}" id="sp-${track.id}">
  <div class="sp-inner">

    <div class="sp-sec">
      <div class="sp-title">Estéreo / Panorâmica</div>
      <div class="stv" id="stv-${track.id}">
        <div class="stv-center"></div>
        <div class="stv-bar" id="stb-${track.id}" style="background:${track.hex};left:36%;width:28%"></div>
      </div>
      <div class="stv-labels"><span>L</span><span>C</span><span>R</span></div>
      <div class="pan-row">
        <span class="pan-lbl" style="color:${track.hex}">PAN</span>
        <input type="range" id="pan-${track.id}" min="-100" max="100" value="${s.pan}" step="1" oninput="setPan('${track.id}',this.value)">
        <span class="pv" id="panval-${track.id}">${s.pan===0?'C':s.pan>0?'R'+s.pan:'L'+Math.abs(s.pan)}</span>
      </div>
      <div class="tog-row">
        <div class="tog-sw${s.phase?' on':''}" id="ph-${track.id}" onclick="togglePhase('${track.id}')"></div>
        <span class="tog-lbl">Inverter fase (Ø)</span>
      </div>
    </div>

    <div class="sp-sec">
      <div class="sp-title">Equalização (3 bandas)</div>
      <div class="eq-bands">
        <div class="eq-row">
          <span class="eq-lbl" style="color:#4FC3FF">LOW</span>
          <input type="range" id="eqlow-${track.id}" min="-14" max="14" value="${s.eq.low.gain}" step=".5" oninput="setEQ('${track.id}','low','gain',this.value)">
          <span class="eq-val" id="eqlow-${track.id}v">${s.eq.low.gain>0?'+':''}${s.eq.low.gain.toFixed(1)}dB</span>
        </div>
        <div class="eq-row">
          <span class="eq-lbl" style="color:${track.hex}">MID</span>
          <input type="range" id="eqmid-${track.id}" min="-14" max="14" value="${s.eq.mid.gain}" step=".5" oninput="setEQ('${track.id}','mid','gain',this.value)">
          <span class="eq-val" id="eqmid-${track.id}v">${s.eq.mid.gain>0?'+':''}${s.eq.mid.gain.toFixed(1)}dB</span>
        </div>
        <div class="eq-row">
          <span class="eq-lbl" style="color:#FF8C42">HIGH</span>
          <input type="range" id="eqhigh-${track.id}" min="-14" max="14" value="${s.eq.high.gain}" step=".5" oninput="setEQ('${track.id}','high','gain',this.value)">
          <span class="eq-val" id="eqhigh-${track.id}v">${s.eq.high.gain>0?'+':''}${s.eq.high.gain.toFixed(1)}dB</span>

          <span class="sv" id="revv-${track.id}">${s.sends.reverb}</span>
        </div>
        <div class="send-row">
          <span class="send-lbl" style="color:#20C8FF">Delay</span>
          <input type="range" id="del-${track.id}" min="0" max="100" value="${s.sends.delay}" oninput="setSend('${track.id}','delay',this.value)">
          <span class="sv" id="delv-${track.id}">${s.sends.delay}</span>
        </div>
      </div>
    </div>

  </div>
</div>
    `;
    wrap.appendChild(block);
    document.getElementById('mute-'+track.id).onclick=()=>toggleMute(track.id);
    document.getElementById('solo-'+track.id).onclick=()=>toggleSolo(track.id);
    document.getElementById('cfg-'+track.id).onclick=()=>toggleSettings(track.id);
  });

  requestAnimationFrame(()=>{
    TRACKS.forEach(t=>{
      fillSlider(document.getElementById('vol-'+t.id),t.hex);
      fillSlider(document.getElementById('pan-'+t.id),'var(--accent)',true);
      fillSlider(document.getElementById('eqlow-'+t.id),'#4FC3FF',true);
      fillSlider(document.getElementById('eqmid-'+t.id),t.hex,true);

      const cv=document.getElementById('wave-'+t.id);
      if(cv){cv.width=cv.offsetWidth||140; drawFlat(cv.getContext('2d'),cv.width,cv.height,t.hex);}
      // eq canvas if open
      if(state[t.id].settingsOpen){
        const eq=document.getElementById('eqcv-'+t.id);
        if(eq){eq.width=eq.offsetWidth||220; drawEQ(t.id);}
      }
    });
    fillSlider(document.getElementById('masterVol'),'var(--accent)');
    drawTicks();
  });
}

// EVENTS
document.getElementById('btnPlay').onclick=()=>isPlaying?pause():play();
document.getElementById('btnStop').onclick=stop;
document.getElementById('btnRew').onclick=()=>{if(isPlaying){pause();pauseOffset=0;play();}else{pauseOffset=0;moveTL(0);}};
document.getElementById('btnLoop').onclick=function(){loopEnabled=!loopEnabled;this.classList.toggle('active',loopEnabled);};
document.getElementById('btnMetro').onclick=function(){this.classList.toggle('active');};
document.getElementById('masterVol').oninput=function(){
  const v=parseInt(this.value);
  document.getElementById('masterVolVal').textContent=v;
  if(masterGain)masterGain.gain.value=v/100;
  fillSlider(this,'var(--accent)');
};
document.getElementById('timeline').onclick=function(e){
  const r=(e.clientX-this.getBoundingClientRect().left)/this.offsetWidth;
  pauseOffset=r*DURATION;
  if(isPlaying){pause();play();}else{moveTL(r);updT(pauseOffset);}
};
document.getElementById('btnMuteAll').onclick=()=>TRACKS.forEach(t=>{state[t.id].muted=true;document.getElementById('mute-'+t.id).classList.add('muted');if(audioCtx)updateGain(t.id);});
document.getElementById('btnUnmuteAll').onclick=()=>TRACKS.forEach(t=>{state[t.id].muted=false;document.getElementById('mute-'+t.id).classList.remove('muted');if(audioCtx)updateGain(t.id);});
document.getElementById('btnImport').onclick=()=>{document.getElementById('dropZone').classList.add('active');setTimeout(()=>document.getElementById('dropZone').classList.remove('active'),2500);};
document.getElementById('btnExport').onclick=()=>{setSt('Exportando mix...','#FFD020');setTimeout(()=>setSt('Mix exportado','#20E87A'),1500);};
document.getElementById('bpmInput').onchange=()=>{drawTicks();if(isPlaying){pause();play();}};
document.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('dropZone').classList.add('active');});
document.addEventListener('dragleave',()=>document.getElementById('dropZone').classList.remove('active'));
document.addEventListener('drop',e=>{e.preventDefault();document.getElementById('dropZone').classList.remove('active');});
document.getElementById('dropZone').onclick=()=>document.getElementById('dropZone').classList.remove('active');
window.addEventListener('resize',()=>{drawTicks();TRACKS.forEach(t=>{const cv=document.getElementById('wave-'+t.id);if(cv){cv.width=cv.offsetWidth||140;drawFlat(cv.getContext('2d'),cv.width,cv.height,t.hex);}});});

renderTracks();
</script>
